name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Check and Run Tests
        run: |
          if [ -f "Rakefile" ] && grep -q "test" Rakefile; then
            echo "Running tests..."
            bundle exec rake test
          elif [ -d "test" ] && [ "$(ls -A test 2>/dev/null)" ]; then
            echo "Test directory found, running tests..."
            bundle exec rake test
          else
            echo "No tests found - skipping test step"
          fi
        continue-on-error: true

      - name: Build artifact
        run: |
          mkdir -p artifact
          cp -r dist src scripts Gemfile* *.yml artifact/ 2>/dev/null || :
          tar -czf pipeline-artifact.tar.gz artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: pipeline-artifact.tar.gz

  docker-build:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name to lowercase
        run: |
          RAW=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          CLEAN=$(echo "$RAW" | sed 's/-*\/-*/\//g' | sed 's/-$//')
          echo "IMAGE_NAME=$CLEAN" >> $GITHUB_ENV
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Dockerfile if not exists
        run: |
          if [ ! -f Dockerfile ]; then
            cat > Dockerfile << 'EOF'
          FROM alpine:latest
          RUN mkdir -p /app
          COPY dist/ /app/dist/
          COPY src/ /app/src/
          COPY scripts/ /app/scripts/
          WORKDIR /app
          CMD ["sh", "-c", "echo 'Container running' && tail -f /dev/null"]
          EOF
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
